<!DOCTYPE html>
<!--
  site/subpage-template.html — Subpage template for /ai-draw --mode site.

  Asset path note:
    This template uses "../../../assets/..." which is correct for depth-1 pages
    located at <outdir>/pages/<slug>.html.

    For depth-2 pages at <outdir>/pages/<parent>/<slug>.html, the main controller
    MUST prepend one additional "../" before passing <ASSET_PREFIX> to the subagent,
    making it "../../../../assets/...". The subagent replaces all occurrences of
    the asset prefix placeholder accordingly.

    In practice: replace every occurrence of "../../assets/" in this template
    with "<ASSET_PREFIX>/assets/" where <ASSET_PREFIX> is provided in the subagent prompt.
-->
<html lang="zh-CN" data-themes="{{THEMES_CSV}}" data-site-id="{{SITE_ID}}">
<head>
  <meta charset="utf-8">
  <title>{{TITLE}}</title>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
  <!-- Depth-1 default: ../../../assets/... — controller adjusts prefix for deeper pages -->
  <link rel="stylesheet" href="../../../assets/base.css">
  <link rel="stylesheet" id="theme-link" href="../../../assets/themes-diagram/tech-dark.css">
</head>
<body data-mode="single">
  <div id="report-container" class="container">
    <!-- Breadcrumb navigation: filled by subagent with {{BREADCRUMB}} -->
    <nav class="ai-draw-breadcrumb" style="margin-bottom: 16px; font-size: 13px; color: var(--text-2); font-family: var(--font-mono);">
      {{BREADCRUMB}}
    </nav>

    <header>
      <h1>{{TITLE}}</h1>
      <p class="subtitle">{{SUBTITLE}}</p>
    </header>

    <div class="diagram-wrapper">
      <svg viewBox="0 0 1000 680" style="width: 100%; height: auto;">
        <defs>
          <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
            <path d="M 40 0 L 0 0 0 40" fill="none" stroke="var(--grid)" stroke-width="0.5"/>
          </pattern>
          <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
            <polygon points="0 0, 10 3.5, 0 7" fill="var(--text-3)" />
          </marker>
        </defs>
        <rect width="100%" height="100%" fill="url(#grid)"/>

        <!-- ARROWS GO FIRST (so they render behind boxes) -->
        {{ARROWS}}

        <!-- COMPONENTS (children listed in the subagent prompt become drillable per §11;
             all other components are regular non-drillable boxes) -->
        {{COMPONENTS}}

        <!-- LEGEND (place outside all boundary boxes; see diagrams/architecture/INSTRUCTIONS.md §6) -->
        {{LEGEND}}
      </svg>
    </div>

    <div class="cards" style="display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-top:24px;">
      {{SUMMARY_CARDS}}
    </div>

    <footer style="margin-top:24px;color:var(--text-3);font-size:11px;text-align:center;">
      <a href="{{PARENT_PATH}}" style="color:var(--text-2);">← back to {{PARENT_TITLE}}</a>
      &nbsp;·&nbsp;
      Generated by <a href="https://github.com/stone-yu/ai-draw-skill" style="color:var(--text-2);">ai-draw</a>
      · Press <kbd>T</kbd> to cycle theme · <kbd>F</kbd> fullscreen · <kbd>⋯</kbd> to export
      · <span style="color:var(--accent);">↗</span> on a component to drill into its subpage
    </footer>
  </div>

  <!-- Diagram libs (same CDN list as other templates for runtime API consistency) -->
  <script src="https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/d3@7/dist/d3.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/markmap-lib@0.17/dist/browser/index.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/markmap-view@0.17"></script>
  <script src="https://cdn.jsdelivr.net/npm/elkjs@0.9/lib/elk.bundled.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"
          integrity="sha384-ZZ1pncU3bQe8y31yfZdMFdSpttDoPmOZg2wguVK9almUodir1PghgT0eY7Mrty8H" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.2/dist/jspdf.umd.min.js"
          integrity="sha384-en/ztfPSRkGfME4KIm05joYXynqzUgbsG5nMrj/xEFAHXkeZfO3yMK8QQ+mP7p1/" crossorigin="anonymous"></script>
  <!-- Depth-1 default: ../../../assets/... — controller adjusts prefix for deeper pages -->
  <script src="../../../assets/runtime.js"></script>
  <script src="../../../assets/exporter.js"></script>
</body>
</html>
